name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild build \
            -scheme Cadence \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            -derivedDataPath build

      - name: Ad-hoc sign app
        run: |
          codesign --force --deep --sign - build/Build/Products/Release/Cadence.app

      - name: Stage app for DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/Cadence.app dmg-staging/

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Cadence" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Cadence.app" 150 185 \
            --hide-extension "Cadence.app" \
            --app-drop-link 450 185 \
            "Cadence-${{ github.ref_name }}.dmg" \
            dmg-staging/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "Cadence-${{ github.ref_name }}.dmg"
          body: |
            ## Download

            1. Download `Cadence-${{ github.ref_name }}.dmg` below
            2. Open the DMG and drag **Cadence** to your Applications folder
            3. **First launch — macOS will block it.** Do this once to allow it:
               - Try to open Cadence — macOS will show a warning, click **Done**
               - Open **System Settings** → **Privacy & Security**
               - Scroll down to the Security section — you'll see _"Cadence was blocked"_ with an **Open Anyway** button
               - Click **Open Anyway**, enter your password if prompted, then click **Open**

            ## Requirements

            - macOS 14 or later
            - Capture One (any current version)
